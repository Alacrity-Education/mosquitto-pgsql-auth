name: Build and Release

on:
  release:
    types: [published]

env:
  MOSQ_VERSION: "2.1.2"

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            libc: glibc
          - runner: ubuntu-24.04-arm
            arch: arm64
            libc: glibc
          - runner: ubuntu-latest
            arch: x86_64
            libc: musl
            container: alpine:3.21

    steps:
      - name: Install git (musl)
        if: matrix.libc == 'musl'
        run: |
          apk add --no-cache git
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v4

      - name: Install dependencies (glibc)
        if: matrix.libc == 'glibc'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            perl \
            bison \
            flex \
            libcjson-dev \
            zlib1g-dev

      - name: Install dependencies (musl)
        if: matrix.libc == 'musl'
        run: |
          apk add --no-cache \
            build-base \
            cmake \
            perl \
            bison \
            flex \
            cjson-dev \
            wget \
            github-cli

      - name: Install Mosquitto headers (glibc)
        if: matrix.libc == 'glibc'
        run: |
          wget -qO /tmp/mosquitto.tar.gz \
            "https://github.com/eclipse-mosquitto/mosquitto/archive/refs/tags/v${MOSQ_VERSION}.tar.gz"
          tar -xzf /tmp/mosquitto.tar.gz -C /tmp
          sudo cp -r /tmp/mosquitto-${MOSQ_VERSION}/include/. /usr/local/include/

      - name: Install Mosquitto headers (musl)
        if: matrix.libc == 'musl'
        run: |
          wget -qO /tmp/mosquitto.tar.gz \
            "https://github.com/eclipse-mosquitto/mosquitto/archive/refs/tags/v${MOSQ_VERSION}.tar.gz"
          tar -xzf /tmp/mosquitto.tar.gz -C /tmp
          cp -r /tmp/mosquitto-${MOSQ_VERSION}/include/. /usr/local/include/

      - name: Cache PostgreSQL build
        uses: actions/cache@v4
        with:
          path: |
            build/libpq_ext-prefix
            build/libpq-install
          key: libpq-17.2-${{ matrix.arch }}-${{ matrix.libc }}

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Upload to release
        run: |
          cp build/mosquitto_pgsql_auth.so mosquitto_pgsql_auth-${{ matrix.arch }}-${{ matrix.libc }}.so
          gh release upload "${{ github.event.release.tag_name }}" \
            "mosquitto_pgsql_auth-${{ matrix.arch }}-${{ matrix.libc }}.so"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
