name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            perl \
            bison \
            flex \
            libmosquitto-dev

      - name: Cache PostgreSQL build
        uses: actions/cache@v4
        with:
          path: |
            build/libpq_ext-prefix
            build/libpq-install
          key: libpq-17.2-${{ matrix.arch }}

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosquitto_pgsql_auth-${{ matrix.arch }}
          path: build/mosquitto_pgsql_auth.so

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            "artifacts/mosquitto_pgsql_auth-x86_64/mosquitto_pgsql_auth.so#mosquitto_pgsql_auth-x86_64.so" \
            "artifacts/mosquitto_pgsql_auth-arm64/mosquitto_pgsql_auth.so#mosquitto_pgsql_auth-arm64.so"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
