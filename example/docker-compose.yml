services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mqttauth
      POSTGRES_PASSWORD: mqttauth
      POSTGRES_DB: mqttauth
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mqttauth"]
      interval: 2s
      timeout: 3s
      retries: 10

  plugin-download:
    image: alpine:3.21
    environment:
      PLUGIN_URL: https://github.com/Alacrity-Education/mosquitto-pgsql-auth/releases/latest/download/mosquitto_pgsql_auth-x86_64-musl.so
    command: sh -c 'test -f /plugins/mosquitto_pgsql_auth.so || wget -qO /plugins/mosquitto_pgsql_auth.so "$$PLUGIN_URL"'
    volumes:
      - plugin:/plugins

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - plugin:/mosquitto/plugins:ro
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DATABASE: mqttauth
      PG_USERNAME: mqttauth
      PG_PASSWORD: mqttauth
      PG_QUERY: "SELECT 1 FROM mqtt_users WHERE username = $$1 AND password = $$2"
    depends_on:
      postgres:
        condition: service_healthy
      plugin-download:
        condition: service_completed_successfully

volumes:
  plugin:
